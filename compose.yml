version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass the backend URL so the frontend can connect to it.
        # Since the browser evaluates this, it should point to the host's exposed port.
        - VITE_API_BASE_URL=http://localhost:3000
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: always

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - DB_HOST=database
      - DB_PORT=5432
      - DB_PASSWORD=password
      - DB_DATABASE=bug_brief
      - DB_USER=postgres
    depends_on:
      database:
        condition: service_healthy
    restart: always

  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bug_brief
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Automatically initialize the database with our schema.
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bug_brief"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data:
